[package]
name = "caffeineai-oql"
version = "0.1.0"
description = "Object Query Layer — expose a canister's data shape via schema() and answer JSON queries via execute(), with filters, aggregation, and edge traversal."
license = "Apache-2.0"
repository = "https://github.com/caffeinelabs/skills"
keywords = ["motoko", "icp", "query", "schema", "data"]

[dependencies]
core = "2.2.0"
json = "1.4.0"

[toolchain]
moc = "1.9.0"

[moc]
args = [
  "--default-persistent-actors",
  "--implicit-package=core",
  "-W",
  "M0236",
]
